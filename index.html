<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Salimbay</title>
  <meta name="description" content="Salimbay — something new is coming soon.">
  <meta name="theme-color" content="#0b0b0c">
  <style>
    :root {
      --bg: #ffffff;
      --text: #111114;
      --muted: #6b6b73;
      --line: #e6e6e9;
      --hover: #f4f4f6;
      --glow: rgba(99, 102, 241, 0.16);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0b0c;
        --text: #f3f3f5;
        --muted: #9a9aa2;
        --line: #26262b;
        --hover: #17171b;
        --glow: rgba(99, 102, 241, 0.22);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* soft animated glow behind the hero */
    body::before {
      content: "";
      position: fixed;
      top: 50%; left: 50%;
      width: 60vmax; height: 60vmax;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--glow), transparent 60%);
      z-index: -1;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.8; }
      50%      { transform: translate(-50%, -50%) scale(1.25); opacity: 1;   }
    }

    /* ---- Header with icon links ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
    }
    .brand {
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .icons { display: flex; gap: 12px; }
    .icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px; height: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .icons a:hover {
      color: var(--text);
      border-color: transparent;
      background: var(--hover);
      transform: translateY(-3px) scale(1.06);
    }
    .icons svg { width: 19px; height: 19px; }

    /* ---- Hero ---- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: var(--muted);
      margin-bottom: 26px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    .soon {
      font-size: clamp(4.5rem, 24vw, 13rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.05em;
      background: linear-gradient(90deg, #6366f1, #a855f7, #22d3ee, #6366f1);
      background-size: 300% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer {
      to { background-position: 300% center; }
    }

    .sub {
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      margin-top: 24px;
      max-width: 460px;
    }

    /* ---- Entrance reveal ---- */
    .reveal { opacity: 0; transform: translateY(18px); animation: reveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    header .reveal { transform: translateY(-14px); }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.18s; }
    .d3 { animation-delay: 0.32s; }
    .d4 { animation-delay: 0.46s; }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

    @media (prefers-reduced-motion: reduce) {
      *, body::before { animation: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand reveal d1" href="/">Salimbay</a>
    <nav class="icons reveal d2">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>

    </nav>

  <main>
    <h1>Hello world. Something cool is coming soooooon</h1>
  </main>
</body>
</html>
